<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Non-Bored Game Nights{% endblock %}</title>

  <!-- WhatsApp reads these to build the link preview. Without them your link
       looks like spam in the chat. -->
  <meta property="og:title" content="{% block og_title %}Non-Bored Game Nights{% endblock %}">
  <meta property="og:description" content="{% block og_desc %}Sign up, pick your games, climb the leaderboard.{% endblock %}">
  <meta property="og:type" content="website">

  <style>
    :root {
      --bg: #14131a; --card: #1d1b26; --line: #2e2b3b;
      --ink: #eceaf3; --muted: #9a95ad; --accent: #8a7cf0; --good: #4ec38a;
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0 1rem 4rem;
      background: var(--bg); color: var(--ink);
      font: 16px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    header { display: flex; align-items: baseline; gap: 1rem; padding: 1.5rem 0; flex-wrap: wrap; }
    header a.brand { font-weight: 600; font-size: 1.1rem; text-decoration: none; color: var(--ink); }
    nav { margin-left: auto; display: flex; gap: 1rem; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--ink); }
    h1 { font-size: 1.6rem; margin: 0 0 0.25rem; }
    h2 { font-size: 1.1rem; margin: 2rem 0 0.75rem; font-weight: 600; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
    .card a { color: var(--ink); text-decoration: none; }
    .muted { color: var(--muted); font-size: 0.9rem; }
    .pill { display: inline-block; background: #2a2735; border-radius: 99px; padding: 0.1rem 0.6rem; font-size: 0.8rem; color: var(--muted); margin-right: 0.25rem; }
    .flash { background: #1e3a2c; border: 1px solid #2f6a4e; color: #b9f0d3; padding: 0.75rem 1rem; border-radius: var(--radius); margin-bottom: 1rem; }
    .warn { background: #3a1e26; border-color: #6a2f3f; color: #f0b9c6; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin: 0.75rem 0 0.25rem; }
    input[type=text], input[type=password], input[type=datetime-local], input[type=number], select {
      width: 100%; padding: 0.6rem 0.75rem; border-radius: 8px;
      border: 1px solid var(--line); background: #17161f; color: var(--ink); font-size: 1rem;
    }
    button {
      margin-top: 1rem; padding: 0.7rem 1.2rem; border: 0; border-radius: 8px;
      background: var(--accent); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    button.ghost { background: transparent; border: 1px solid var(--line); color: var(--muted); font-weight: 400; font-size: 0.85rem; padding: 0.3rem 0.7rem; margin: 0; }
    .gamefilter { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
    .gamefilter button {
      margin: 0; padding: 0.3rem 0.7rem; font-size: 0.8rem; font-weight: 400;
      background: transparent; border: 1px solid var(--line); color: var(--muted);
      border-radius: 99px; cursor: pointer;
    }
    .gamefilter button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .gamelist { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 0.75rem; }
    .gamecard {
      position: relative; display: flex; gap: 0.9rem; align-items: flex-start; margin: 0;
      background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 0.85rem; cursor: pointer; transition: border-color .12s, background .12s;
    }
    .gamecard:hover { border-color: #46425c; }
    /* The checkbox is hidden but still the real control — clicking anywhere on
       the card toggles it, because the whole card is a <label> for it. */
    .gamecard input { position: absolute; opacity: 0; pointer-events: none; }
    .gamecard:has(input:checked) { border-color: var(--accent); background: #221f33; }
    .gamecard-media { flex: 0 0 72px; }
    .gamecard-media img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; display: block; }
    .gamecard-noimage { width: 72px; height: 72px; border-radius: 8px; background: #262332; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
    .gamecard-body { flex: 1; min-width: 0; }
    .gamecard-tick {
      flex: 0 0 22px; width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid var(--line); display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: transparent; align-self: center;
    }
    .gamecard:has(input:checked) .gamecard-tick { background: var(--accent); border-color: var(--accent); color: #fff; }
    button:disabled { background: #33304a; color: var(--muted); cursor: not-allowed; }
    textarea {
      width: 100%; padding: 0.6rem 0.75rem; border-radius: 8px; min-height: 4.5rem;
      border: 1px solid var(--line); background: #17161f; color: var(--ink);
      font: inherit; font-size: 0.95rem; resize: vertical;
    }
    input[type=file] { width: 100%; font-size: 0.85rem; color: var(--muted); }
    .bar { height: 6px; background: var(--accent); border-radius: 99px; }
    table { width: 100%; border-collapse: collapse; }
    td, th { text-align: left; padding: 0.5rem 0; border-bottom: 1px solid var(--line); font-size: 0.95rem; }
    th { color: var(--muted); font-weight: 400; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="brand" href="/">🎲 Non-Bored Game Nights</a>
      <nav>
        <a href="/">Home</a>
        <a href="/games">Games</a>
        <a href="/leaderboard">Leaderboard</a>
        <a href="/players">Players</a>
        {% if is_admin(request) %}<a href="/admin">Admin</a>{% endif %}
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>

  <script>
    // Filter the game list by mode. Purely a show/hide of cards already on the
    // page, so it needs no server round-trip and, on the sign-up page, leaves
    // any ticked-but-hidden game still ticked and still submitted. Harmless on
    // pages that have no filter bar.
    (function () {
      const bar = document.querySelector('.gamefilter');
      if (!bar) return;
      const cards = document.querySelectorAll('.gamelist .gamecard');
      bar.addEventListener('click', function (e) {
        const btn = e.target.closest('button[data-filter]');
        if (!btn) return;
        bar.querySelectorAll('button').forEach(b => b.classList.toggle('active', b === btn));
        const want = btn.dataset.filter;
        cards.forEach(c => {
          c.style.display = (want === 'all' || c.dataset.mode === want) ? '' : 'none';
        });
      });
    })();
  </script>
</body>
</html>
