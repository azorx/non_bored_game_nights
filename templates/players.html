{% extends "base.html" %}
{% block content %}

<h1>Players</h1>

{% if players %}
<div class="card">
  <table>
    <tr><th>Who</th><th style="text-align:right">Nights signed up</th></tr>
    {% for p in players %}
      <tr>
        <td><span style="font-size:1.15rem; margin-right:.35rem">{{ p.emoji }}</span>{{ p.name }}</td>
        <td style="text-align:right" class="muted">{{ p.nights_attended }}</td>
      </tr>
    {% endfor %}
  </table>
</div>
{% else %}
  <p class="muted">Nobody yet. Players appear here as soon as they sign up for a night.</p>
{% endif %}

{% endblock %}
